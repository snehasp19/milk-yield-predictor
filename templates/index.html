<!DOCTYPE html>
<html>
<head>
    <title>Milk Yield Predictor</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            margin-top:50px;
            background:#f5f5f5;
        }

        .container{
            width:400px;
            margin:auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        h2{
            color:#333;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🐄 Dairy Farm Milk Yield Prediction System</h2>
    <p>
Predict daily milk production using Machine Learning
</p>

    <form action="/predict" method="post">

        <input type="number" name="parity"
               placeholder="Parity" required>

        <input type="number" name="days_in_milk"
               placeholder="Days in Milk" required>

        <input type="number" step="0.1"
               name="bcs"
               placeholder="Body Condition Score" required>

        <input type="number" step="0.1"
               name="feed_intake"
               placeholder="Feed Intake (kg)" required>

        <button type="submit">
            Predict Milk Yield
        </button>

    </form>

    <h3>{{ prediction_text }}</h3>

</div>

</body>
</html>
